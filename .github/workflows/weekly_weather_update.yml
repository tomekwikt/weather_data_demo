name: Weekly Weather Update

on:
  schedule:
    # Every Wednesday at 10:00 UTC
    - cron: "0 10 * * 3"

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly weather update
        run: |
          python update_weather.py

  
      - name: Commit updated weather files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weather_state_weekly.csv data/weather_state_weekly.parquet
          git diff --cached --quiet || git commit -m "chore: weekly weather update"
          git pull --rebase origin main
          git push origin main
